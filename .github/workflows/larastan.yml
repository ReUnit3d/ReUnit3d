name: PHP Static Analysis (Larastan)
on: [ push, pull_request ]
jobs:
    test:
        strategy:
            matrix:
                operating-system:
                    - ubuntu-24.04
                php-version:
                    - '8.5'
        name: php ${{ matrix.php-version }} on ${{ matrix.operating-system }}
        runs-on: ${{ matrix.operating-system }}
        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ALLOW_EMPTY_PASSWORD: yes
                    MYSQL_DATABASE: unit3d
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
            redis:
                image: redis:5.0
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            # 1. Checkout
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            # 2. Setup PHP
            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    extensions: bcmath, ctype, dom, fileinfo, json, libxml, mbstring, openssl, pdo, tokenizer, xml, zip
                    coverage: none

            # 3. Composer Dependencies
            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Restore Composer cache
                uses: actions/cache/restore@v4
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: |
                        unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-

            -   name: Install Composer dependencies
                env:
                    COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
                run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

            -   name: Save Composer cache
                uses: actions/cache/save@v4
                if: always()
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}

            # 4. Prepare Application
            -   name: Prepare Laravel environment
                run: cp .env.example .env

            -   name: Generate application key
                run: php artisan key:generate

            -   name: Clear application cache
                run: php artisan optimize:clear

            # 5. PHPStan Analysis
            -   name: Restore PHPStan cache
                uses: actions/cache/restore@v4
                with:
                    path: .phpstan.cache
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-phpstan-${{ github.run_id }}
                    restore-keys: |
                        unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-phpstan-

            -   name: Run Larastan
                run: ./vendor/bin/phpstan analyse -vvv --memory-limit=2G

            -   name: Save PHPStan cache
                uses: actions/cache/save@v4
                if: always()
                with:
                    path: .phpstan.cache
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-phpstan-${{ github.run_id }}