name: PHP Lint (Pint)
on: [ push, pull_request ]
jobs:
    pint:
        strategy:
            matrix:
                operating-system:
                    - ubuntu-24.04
                php-version:
                    - '8.5'
        name: php ${{ matrix.php-version }} on ${{ matrix.operating-system }}
        runs-on: ${{ matrix.operating-system }}
        steps:
            # 1. Checkout
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            # 2. Setup PHP
            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    extensions: curl, dom, gd, libxml, mbstring, zip, mysql, xml, intl, bcmath, redis-phpredis/phpredis@6.0.1
                    ini-values: error_reporting=E_ALL
                    coverage: pcov
                    tools: composer:v2
                env:
                    REDIS_CONFIGURE_OPTS: --enable-redis

            # 3. Composer Dependencies
            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Restore Composer cache
                uses: actions/cache/restore@v4
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: |
                        unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-

            -   name: Install Composer dependencies
                env:
                    COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
                run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

            -   name: Save Composer cache
                uses: actions/cache/save@v4
                if: always()
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}

            # 4. Run Pint
            -   name: Restore Pint cache
                uses: actions/cache/restore@v4
                with:
                    path: .pint.cache
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-pint-${{ github.run_id }}
                    restore-keys: |
                        unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-pint-

            -   name: Run Pint
                run: ./vendor/bin/pint -v

            -   name: Save Pint cache
                uses: actions/cache/save@v4
                if: always()
                with:
                    path: .pint.cache
                    key: unit3d-${{ matrix.operating-system }}-php${{ matrix.php-version }}-pint-${{ github.run_id }}

            # 5. Commit Changes
            -   name: Commit changes
                uses: stefanzweifel/git-auto-commit-action@v7
                with:
                    commit_message: "automation: laravel pint ci"
                    commit_user_name: unit3d-bot
                    commit_user_email: unit3d_gh_bot@protonmail.com
                    commit_author: unit3d-bot <unit3d_gh_bot@protonmail.com>
